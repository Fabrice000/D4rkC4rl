site_name: "D4rkC4rl's Blog"
site_description: 'There is the cyber blog of D4rkC4rl.'
site_url: https://fabrice000.github.io/D4rkC4rl/

nav:
  - Home: index.md
  - Notes:
      - Learn cybersecurity: notes/article1.md
  - Write-ups:
      - CTFs: 
          - SADC: 
              - writeups/SADC NextGenCyber CTF/web.md
              - writeups/SADC NextGenCyber CTF/reversing.md
      - Tryhackme: writeups/thm.md
      - Hackthebox: writeups/htb.md
  - Resources:
      - Mobile: resources/mobile.md
      - Web: resources/web.md
      - Pwn: resources/pwn.md
      - Miscellaneous: resources/misc.md
      - Osint: resources/osint.md
      - Crypto: resources/crypto.md
  - About: about.md
  - Contact: contact.md



theme:
  name: material
  color_mode: auto
  user_color_mode_toggle: true
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
plugins:
  - include-markdown
  - search
  - git-revision-date-localized
  - social
  - mkdocstrings:
      handlers:
        # See: https://mkdocstrings.github.io/python/usage/
        python:
          options:
            docstring_style: sphinx
  

features:
  - content.code.copy
  - content.action.edit
  - content.action.view
  - content.tooltips
  - navigation.tracking
  - navigation.top
  - search.share
  - search.suggest

extra_css:
  - main.css

markdown_extensions:
  - tables
  - attr_list
  - admonition
  - def_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg